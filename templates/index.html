<!DOCTYPE html>
<html lang="eng">
  <head>
    <title>spliter</title>
    <link rel="stylesheet" href="static/style.css">
    <meta name="viewport" content="widht=device-widht, initial-scale=0.1">
    <meta name="description" content=" free gas split no need register on cookies maight sleep so give wakeup"
    <meta name="google-site-verification" content="yPP9-02JgFSp6lVYAHHDdBnx4jXnMZxg3VZUyX-dB3Q" />
    </head>
    <body>
      <h1>GAS-SPLI-APP</h1>
      <h2> FREE </h2>
      <H2>split gas payments for friends</H2>
      <form action="/" method="POST">
        <div>
        <label>travel(km)</label>
        <input type="number" name="travel" step="0.1" placeholder="esim. 150" required></div>
        <div>
        <label>fuel consumption (L/100km)</label>
        <input type="number" name="cars"  step="0.1" placeholder="esim. 6.5" required></div>
        <div>
        <label>fuel price (€/L)</label>
        <input type="number" name="gasprice"
        step="0.1" placeholder="esim. 1.80" reqired></div>
        <div>
        <label>passengers</label>
        <input type="number" name="p" step="1" placeholder="esim. 4" required></div>
        <button type="submit">DONE</button>
      </form>
      {% if total %}
      <div class="f"> total: {{ total }} €
      </div>
      {% endif %}
      </div>
    </body>
</html>
